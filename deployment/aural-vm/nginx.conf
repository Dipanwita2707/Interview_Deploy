user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Use Docker's internal DNS resolver — resolves container names per-request
    # instead of at startup, so nginx stays up even if relay containers are down.
    resolver 127.0.0.11 valid=30s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80 default_server;
        server_name _; # Responds to direct IP or any configured domain

        # ── Next.js static assets: override Content-Type for .js chunks ─────────
        # The client-side proxy (forward.http.proxy:3128) blocks files classified
        # as "vbs-js-jse-wfs-ps1" — i.e. files with Content-Type application/javascript.
        # By overriding the Content-Type to application/octet-stream for all
        # _next/static/ JS chunks, we bypass the proxy's MIME-type filter.
        location /_next/static/ {
            proxy_pass http://aural-app:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Override Content-Type: force all responses to binary/octet-stream
            # so proxy does not classify .js files as blocked scripts.
            proxy_hide_header Content-Type;
            add_header Content-Type application/octet-stream always;

            # Long-lived caching — Next.js hashes chunk filenames on each build
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Frontend & Next.js pages
        location / {
            proxy_pass http://aural-app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Primary Voice Relay WebSocket route (Volcengine Doubao)
        # Uses a variable so nginx resolves the hostname lazily (per-request)
        # and does NOT fail at startup if the container is stopped.
        location /voice-relay {
            set $upstream_doubao "aural-voice-relay-doubao:8081";
            proxy_pass http://$upstream_doubao;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Backup Voice Relay WebSocket route (Azure Realtime)
        location /openai-voice-relay {
            set $upstream_azure "aural-voice-relay-azure:8082";
            proxy_pass http://$upstream_azure;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Azure Speech Service Relay WebSocket route
        location /azure-voice-relay {
            set $upstream_azure_speech "aural-voice-relay-azure-speech:8083";
            proxy_pass http://$upstream_azure_speech;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}

