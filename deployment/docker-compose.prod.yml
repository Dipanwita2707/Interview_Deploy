version: '3.8'

services:
  # ============================================================
  # 1. Databases & Queues
  # ============================================================
  db:
    image: postgres:15-alpine
    container_name: production-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_prod_pass_2026}
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db-init.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: production-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # 2. Code Execution Sandbox (Judge0)
  # ============================================================
  judge0:
    image: judge0/judge0:1.13.0
    container_name: production-judge0
    privileged: true
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_prod_pass_2026}
      POSTGRES_DB: judge0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # 3. Aural-OSS (AI Interview App & Speech Relays)
  # ============================================================
  aural-app:
    build:
      context: ../aural-oss
      dockerfile: Dockerfile
    container_name: aural-web-app
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${AURAL_APP_URL:-http://aural.example.com}
      # Database connection (Aural database created by db-init.sh)
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_prod_pass_2026}@db:5432/aural
      # Supabase Cloud Integration / Auth keys (if used)
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # LLM Keys
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      KIMI_API_KEY: ${KIMI_API_KEY}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      # Voice Relay configurations
      NEXT_PUBLIC_VOICE_RELAY_URL: ${NEXT_PUBLIC_VOICE_RELAY_URL:-ws://aural.example.com/voice-relay}
      NEXT_PUBLIC_OPENAI_VOICE_RELAY_URL: ${NEXT_PUBLIC_OPENAI_VOICE_RELAY_URL:-ws://aural.example.com/openai-voice-relay}
      NEXT_PUBLIC_VOICE_RELAY_PRIMARY: ${NEXT_PUBLIC_VOICE_RELAY_PRIMARY:-auto}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  aural-voice-relay-doubao:
    build:
      context: ../aural-oss
      dockerfile: Dockerfile
    container_name: aural-voice-relay-doubao
    command: npx tsx server/voice-relay.ts
    environment:
      NODE_ENV: production
      VOICE_RELAY_PORT: 8081
      # Doubao Credentials
      DOUBAO_APP_ID: ${DOUBAO_APP_ID}
      DOUBAO_ACCESS_TOKEN: ${DOUBAO_ACCESS_TOKEN}
      DOUBAO_SECRET_KEY: ${DOUBAO_SECRET_KEY}
      DOUBAO_APP_KEY: ${DOUBAO_APP_KEY}
      DOUBAO_RESOURCE_ID: ${DOUBAO_RESOURCE_ID}
    restart: unless-stopped

  aural-voice-relay-azure:
    build:
      context: ../aural-oss
      dockerfile: Dockerfile
    container_name: aural-voice-relay-azure
    command: npx tsx server/openai-voice-relay.ts
    environment:
      NODE_ENV: production
      OPENAI_VOICE_RELAY_PORT: 8082
      # Azure Credentials
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o-realtime-preview}
      AZURE_OPENAI_VOICE: ${AZURE_OPENAI_VOICE:-alloy}
    restart: unless-stopped

  # ============================================================
  # 4. SMART Coding Platform (API & Frontend Client)
  # ============================================================
  coding-backend:
    build:
      context: ../coding-platform/backend
      dockerfile: Dockerfile
    container_name: coding-backend-api
    environment:
      PORT: 5002
      NODE_ENV: production
      # Connect to local PostgreSQL db
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_prod_pass_2026}@db:5432/coding_platform
      DATABASE_POOL_MIN: 5
      DATABASE_POOL_MAX: 20
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-coding-platform-jwt-secret-change-in-production}
      SMART_SSO_SECRET: ${SMART_SSO_SECRET:-cgpms_jwt_secret_2026_super_secure}
      # URL referencing internal judge0
      JUDGE0_URL: http://judge0:2358
      # Aural Bridge integration keys (local dev key bypass allows seamless local link)
      AURAL_OSS_BRIDGE_URL: ${AURAL_OSS_BRIDGE_URL:-http://aural-app:3000/api/exam-bridge}
      AURAL_OSS_SERVICE_KEY: ${AURAL_OSS_SERVICE_KEY:-cp-bridge-de53f7288acfac071fdf8298d67f597cab0e3f6b951678f2}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  coding-frontend:
    build:
      context: ../coding-platform/frontend
      dockerfile: Dockerfile
      args:
        # Build-time environment parameter pointing to reverse-proxy route
        NEXT_PUBLIC_API_URL: ${CODING_PUBLIC_API_URL:-http://exam.example.com/api}
    container_name: coding-frontend-client
    environment:
      NODE_ENV: production
      PORT: 3001
    depends_on:
      coding-backend:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # 5. Reverse Proxy Gateway
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: production-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - aural-app
      - coding-frontend
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  judge0_data:
