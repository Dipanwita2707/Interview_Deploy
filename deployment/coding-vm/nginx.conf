user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Map .js files to octet-stream to bypass proxy JS-blocking policy.
    # CSS, fonts, and other static assets keep their real Content-Type.
    map $uri $static_content_type {
        default            "";
        ~\.js$             "application/octet-stream";
    }

    # ─── Redirect HTTP → HTTPS ──────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── HTTPS Server ────────────────────────────────────────────
    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Next.js static assets:
        # - .js chunks: Content-Type overridden to application/octet-stream
        #   to bypass the proxy's vbs-js-jse-wfs-ps1 blocking policy.
        # - .css/.woff2/etc: served with their real Content-Type so the
        #   browser actually applies styles and loads fonts.
        location /_next/static/ {
            proxy_pass http://coding-frontend:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Only override Content-Type when the map matched a .js file
            proxy_hide_header Content-Type;
            add_header Content-Type $static_content_type always;

            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Next.js Frontend
        location / {
            proxy_pass http://coding-frontend:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Express Backend API
        location /api {
            proxy_pass http://coding-backend:5002/api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
