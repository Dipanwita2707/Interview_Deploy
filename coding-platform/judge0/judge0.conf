################################
# Judge0 CE Configuration
# https://github.com/judge0/judge0/blob/master/judge0.conf
################################

# PostgreSQL
POSTGRES_HOST=db
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0password

# Redis
REDIS_HOST=redis
REDIS_PORT=6379

# Server
RAILS_ENV=production

# Workers — how many concurrent code executions
WORKERS_COUNT=2

# Execution limits (can be overridden per submission)
CPU_TIME_LIMIT=5
CPU_EXTRA_TIME=1
WALL_TIME_LIMIT=10
MEMORY_LIMIT=262144
STACK_LIMIT=65536
MAX_PROCESSES_AND_OR_THREADS=60
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=false
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=false
MAX_FILE_SIZE=1024
NUMBER_OF_RUNS=1

# Allow all origins (lock this down in production)
ALLOW_ORIGIN=*

# Disable submission cache (set to true to enable)
SUBMISSION_CACHE_DURATION=0

# Secret for authentication (leave blank = no auth required)
# Set this and pass as X-Auth-Token header if you want to secure the endpoint
AUTH_TOKEN=
